            color: #000000;

        .brand-book-icon {
            position: absolute;
            left: -26px;
            top: 50%;

            height: 1.4rem;

        }
        .brand-slogan-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 12px;

        }
        .brand-slogan-text {
            font-size: 0.8rem;
            color: #1b4332;
            font-weight: 700;
            letter-spacing: 1.5px;
            white-space: nowrap;
            font-family: "Noto Serif KR", "Georgia", serif;
        }
        .brand-separator {
            width: 100%;
            height: 1px;
            background-color: #dee2e6;
        }
        
        /* 메인 콘텐츠 */
        .main-content {
            padding: 32px 24px 24px 24px;
            flex: 1;
        }
        .main-tool-title {
            text-align: center;
            color: #1a1f36;
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.8px;
        }

        .subjective-option {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;

        .subjective-option input {

        .subjective-option span {

        .school-toggle {

            padding: 4px;
            border-radius: 10px;
            margin-bottom: 24px;
        }
        .school-toggle button {
            flex: 1;
            border: none;
            background: none;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #495057;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .school-toggle button.active {
            background-color: #2b8a3e;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(43, 138, 62, 0.25);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .input-with-btn {
            display: flex;
            gap: 8px;
        }
        .btn-calc-pop {
            width: 100%;
            padding: 10px;
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2b8a3e;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 20px;
        }

            font-size: 0.88rem;
            font-weight: 700;
            color: #495057;
            margin-bottom: 8px;
            letter-spacing: -0.3px;

            font-size: 1rem;
            border: 1.5px solid #dee2e6;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s ease;
            background-color: #fafbfc;
        }
        input[type="number"]:focus {
            border-color: #2b8a3e;
            background-color: #ffffff;
        }
        .result-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 14px;
            padding: 18px;
            margin-top: 24px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .result-item:last-child {
            margin-bottom: 0;
        }
        .result-label {
            font-size: 0.92rem;
            color: #495057;
            font-weight: 500;
        }
        .result-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1c7ed6;
        }
        .result-value.score {
            color: #2b8a3e;
        }
        
        .timer-section {
            margin-top: 32px;
            border-top: 2px dashed #e9ecef;
            padding-top: 24px;
            text-align: center;
        }
        .timer-display {
            font-size: 2.8rem;
            font-weight: 800;
            color: #212529;
            margin: 12px 0 20px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }
        .btn-container {
            display: flex;
            gap: 10px;
        }
        .timer-btn {
            flex: 1;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-start {
            background-color: #12b886;
            color: white;
            box-shadow: 0 4px 12px rgba(18, 184, 134, 0.2);
        }
        .btn-pause {
            background-color: #f59f00;
            color: white;
            box-shadow: 0 4px 12px rgba(245, 159, 0, 0.2);
        }
        .btn-reset {
            background-color: #fa5252;
            color: white;
            box-shadow: 0 4px 12px rgba(250, 82, 82, 0.2);
            flex: 0 0 35%;
        }

        /* 방문자수 카운터 보드 디자인 */
        .visitor-counter-board {
            display: flex;
            justify-content: center;
            gap: 24px;
            background-color: #f8f9fa;
            border: 1px solid #f1f3f5;
            border-radius: 10px;
            padding: 10px;
            margin-top: 24px;
        }
        .visitor-item {
            font-size: 0.8rem;
            color: #495057;
            font-weight: 600;
        }
        .visitor-num {
            color: #2b8a3e;
            font-weight: 800;
            margin-left: 4px;
        }

        .brand-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f1f3f5;
            text-align: center;
            font-size: 0.82rem;
            color: #868e96;
            line-height: 1.6;
        }
        .brand-footer a {
            color: #2b8a3e;
            text-decoration: none;
            font-weight: 700;
        }

        /* 모달 팝업 스타일 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: popUp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 진짜 일반 계산기 디자인 */
        .calc-screen {
            width: 100%;
            padding: 12px;
            font-size: 1.3rem;
            text-align: right;
            border: 1.5px solid #dee2e6;
            border-radius: 8px;
            margin-bottom: 14px;
            background-color: #f8f9fa;
            font-weight: 700;
            word-wrap: break-word;
            min-height: 52px;
        }
        .calc-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .calc-pad button {
            padding: 16px 0;
            font-size: 1.1rem;
            font-weight: 700;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background-color: #ffffff;
            cursor: pointer;
        }
        .calc-pad button:active {
            background-color: #f1f3f5;
        }
        .calc-pad button.op {
            background-color: #f1f3f5;
            color: #2b8a3e;
        }
        .calc-pad button.cls {
            background-color: #fff0f0;
            color: #fa5252;
        }
        .calc-pad button.back {
            background-color: #f1f3f5;
            color: #e03131;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            background-color: #2b8a3e;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(43, 138, 62, 0.2);
        }
    </style>

<div class="container">

    <div class="main-content">
        <h1 class="main-tool-title">시험 시간 & 점수 환산기</h1>

        <label class="subjective-option" for="check-subjective">
            <input type="checkbox" id="check-subjective" onchange="calculate()">
            <span>📝 서술형 문항 포함 (중등 45분 / 고등 50분 기준)</span>
        </label>

        </div>

        <div class="form-group">
            <label for="max-score">시험지 만점 (점)</label>
            <input type="number" id="max-score" placeholder="예: 80" step="any">
        </div>
        
        <!-- 계산기 진입 유닛 -->
        <button class="btn-calc-pop" onclick="openGeneralCalc()">
            🧮 문항 배점이 여러 종류인가요? 합산 계산기 켜기
        </button>
        
        <div class="form-group">
            <label for="my-score">내가 맞은 총점 (점)</label>
            <input type="number" id="my-score" placeholder="예: 40" step="any">
        </div>

        <div class="result-box">
            <div class="result-item">
                <span class="result-label">⏱️ 배정 시간</span>
                <span class="result-value" id="res-time">- 분</span>
            </div>
            <div class="result-item">
                <span class="result-label">💯 100점 환산 점수</span>
                <span class="result-value score" id="res-score">- 점</span>
            </div>
        </div>

        <div class="timer-section">
            <label>⏳ 실시간 시험 타이머</label>
            <div class="timer-display" id="timer-text">00:00</div>
            
            <div class="btn-container">
                <button id="btn-toggle" class="timer-btn btn-start" onclick="toggleTimer()">시험 시작</button>
                <button id="btn-reset" class="timer-btn btn-reset" onclick="resetTimer()" style="display: none;">초기화</button>
            </div>
        </div>

        <!-- [신규 기능] 실시간 오늘/누적 방문자수 현황판 -->
        <div class="visitor-counter-board">
            <div class="visitor-item">Today <span class="visitor-num" id="visit-today">0</span></div>
            <div class="visitor-item" style="color: #dee2e6;">|</div>
            <div class="visitor-item">Total <span class="visitor-num" id="visit-total">0</span></div>
        </div>

        <div class="brand-footer">

        </div>
    </div>
