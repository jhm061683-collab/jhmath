<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="이룸익산학원 - 시험 시간 & 점수 환산기">
    <meta property="og:description" content="맞춤형 시험 시간 계산 및 실시간 타이머 기능 제공">
    <meta property="og:image" content="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=500&q=80">
    <meta property="og:url" content="https://jhm061683-collab.github.io/jhmath/">

    <title>시험 시간 환산 & 타이머</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", dotum, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }
        h2 {
            text-align: center;
            color: #1a1f36;
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .school-toggle {
            display: flex;
            background-color: #f1f3f5;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .school-toggle button {
            flex: 1;
            border: none;
            background: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .school-toggle button.active {
            background-color: #4c6ef5;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(76, 110, 245, 0.3);
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1.5px solid #dee2e6;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s ease;
        }
        input:focus {
            border-color: #4c6ef5;
        }
        .result-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .result-item:last-child {
            margin-bottom: 0;
        }
        .result-label {
            font-size: 0.95rem;
            color: #495057;
        }
        .result-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1c7ed6;
        }
        .result-value.score {
            color: #2b8a3e;
        }
        
        /* 타이머 섹션 스타일 */
        .timer-section {
            margin-top: 24px;
            border-top: 2px dashed #dee2e6;
            padding-top: 20px;
            text-align: center;
        }
        .timer-display {
            font-size: 2.5rem;
            font-weight: 800;
            color: #212529;
            margin: 10px 0 16px 0;
            font-variant-numeric: tabular-nums; /* 숫자 폭 고정 */
        }
        .timer-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-start {
            background-color: #12b886;
            color: white;
            box-shadow: 0 4px 12px rgba(18, 184, 134, 0.25);
        }
        .btn-stop {
            background-color: #fa5252;
            color: white;
            box-shadow: 0 4px 12px rgba(250, 82, 82, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>시험 시간 & 점수 환산기</h2>
    
    <div class="school-toggle">
        <button id="btn-middle" class="active" onclick="setSchool('middle')">중학생 (35분)</button>
        <button id="btn-high" onclick="setSchool('high')">고등학생 (40분)</button>
    </div>

    <div class="form-group">
        <label for="max-score">시험지 만점 (점)</label>
        <input type="number" id="max-score" placeholder="예: 80">
    </div>
    
    <div class="form-group">
        <label for="my-score">내가 맞은 총점 (점)</label>
        <input type="number" id="my-score" placeholder="예: 40">
    </div>

    <div class="result-box">
        <div class="result-item">
            <span class="result-label">⏱️ 배정 시간</span>
            <span class="result-value" id="res-time">- 분</span>
        </div>
        <div class="result-item">
            <span class="result-label">💯 100점 환산 점수</span>
            <span class="result-value score" id="res-score">- 점</span>
        </div>
    </div>

    <div class="timer-section">
        <label>⏳ 실시간 시험 타이머</label>
        <div class="timer-display" id="timer-text">00:00</div>
        <button id="timer-control-btn" class="timer-btn btn-start" onclick="toggleTimer()">시험 시작</button>
    </div>
</div>

<script>
    var currentSchool = 'middle';
    var totalSeconds = 0; // 타이머 총 초값
    var timerInterval = null;
    var isRunning = false;

    function setSchool(school) {
        if (isRunning) return; // 타이머 작동 중에는 학교 변경 금지
        currentSchool = school;
        document.getElementById('btn-middle').className = (school === 'middle') ? 'active' : '';
        document.getElementById('btn-high').className = (school === 'high') ? 'active' : '';
        calculate();
    }

    function calculate() {
        var maxScoreInput = document.getElementById('max-score').value;
        var myScoreInput = document.getElementById('my-score').value;
        
        var maxScore = parseFloat(maxScoreInput);
        var myScore = parseFloat(myScoreInput);
        
        var resTime = document.getElementById('res-time');
        var resScore = document.getElementById('res-score');

        if (!maxScoreInput || isNaN(maxScore) || maxScore <= 0) {
            resTime.innerText = '- 분';
            resScore.innerText = '- 점';
            if (!isRunning) updateTimerDisplay(0);
            return;
        }

        // 1. 시간 일할 계산
        var baseTime = (currentSchool === 'middle') ? 35 : 40;
        var calculatedTime = baseTime * (maxScore / 100);
        
        // 배정 시간 텍스트 출력용 처리 (소수점 정리)
        var displayTime = calculatedTime.toFixed(1);
        if (displayTime % 1 === 0) displayTime = parseInt(displayTime);
        resTime.innerText = displayTime + ' 분';

        // 타이머용 '초' 계산 (작동 중이 아닐 때만 갱신)
        if (!isRunning) {
            totalSeconds = Math.round(calculatedTime * 60);
            updateTimerDisplay(totalSeconds);
        }

        // 2. 점수 환산
        if (myScoreInput !== '' && !isNaN(myScore) && myScore >= 0) {
            var convertedScore = ((myScore / maxScore) * 100).toFixed(1);
            if (convertedScore % 1 === 0) {
                convertedScore = parseInt(convertedScore);
            }
            resScore.innerText = convertedScore + ' 점';
        } else {
            resScore.innerText = '- 점';
        }
    }

    // 타이머 화면 업데이트 함수
    function updateTimerDisplay(seconds) {
        var min = Math.floor(seconds / 60);
        var sec = seconds % 60;
        
        var minStr = min < 10 ? '0' + min : min;
        var secStr = sec < 10 ? '0' + sec : sec;
        
        document.getElementById('timer-text').innerText = minStr + ':' + secStr;
    }

    // 타이머 시작 / 종료 제어
    function toggleTimer() {
        var btn = document.getElementById('timer-control-btn');
        
        if (isRunning) {
            // 타이머 중단 시
            clearInterval(timerInterval);
            isRunning = false;
            btn.innerText = '시험 시작';
            btn.className = 'timer-btn btn-start';
            calculate(); // 원래 배정 시간으로 리셋
        } else {
            // 타이머 시작 시
            if (totalSeconds <= 0) {
                alert('시험지 만점을 입력해야 시간을 계산하고 타이머를 시작할 수 있습니다.');
                return;
            }
            
            isRunning = true;
            btn.innerText = '시험 종료 (리셋)';
            btn.className = 'timer-btn btn-stop';
            
            // 입력창 비활성화하여 오작동 방지
            document.getElementById('max-score').blur();
            
            timerInterval = setInterval(function() {
                totalSeconds--;
                if (totalSeconds <= 0) {
                    updateTimerDisplay(0);
                    clearInterval(timerInterval);
                    isRunning = false;
                    btn.innerText = '시험 시작';
                    btn.className = 'timer-btn btn-start';
                    alert('⏳ 시험 시간이 종료되었습니다!');
                } else {
                    updateTimerDisplay(totalSeconds);
                }
            }, 1000);
        }
    }

    document.getElementById('max-score').addEventListener('input', calculate);
    document.getElementById('max-score').addEventListener('keyup', calculate);
    document.getElementById('my-score').addEventListener('input', calculate);
    document.getElementById('my-score').addEventListener('keyup', calculate);
</script>

</body>
</html>
